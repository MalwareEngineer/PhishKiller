<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Darla favicon preview</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #e5e5e5;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    padding: 32px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 24px; }
  .row {
    display: flex; gap: 28px; align-items: flex-end; flex-wrap: wrap;
    background: #111; border: 1px solid #222; border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
  }
  .row.light { background: #f5f5f5; color: #0a0a0a; border-color: #ddd; }
  .row.accent { color: #34d399; }
  .sample { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sample span { color: #888; font-size: 11px; font-variant-numeric: tabular-nums; }
  .row.light .sample span { color: #555; }
  img { display: block; }
  h2 { font-size: 14px; font-weight: 500; margin: 24px 0 8px; color: #aaa; }
  .title-bar {
    display: inline-flex; gap: 12px; align-items: center;
    background: #111; border: 1px solid #222; border-radius: 8px;
    padding: 10px 14px;
  }
  .title-bar strong { font-weight: 600; letter-spacing: -0.01em; font-size: 16px; }
</style>
</head>
<body>
<h1>Darla favicon — rendered from your drawing</h1>

<h2>Dark theme (matches Darla)</h2>
<div class="row">
  <div class="sample"><img src="favicon.svg" width="16" height="16" alt=""><span>16</span></div>
  <div class="sample"><img src="favicon.svg" width="24" height="24" alt=""><span>24</span></div>
  <div class="sample"><img src="favicon.svg" width="32" height="32" alt=""><span>32</span></div>
  <div class="sample"><img src="favicon.svg" width="48" height="48" alt=""><span>48</span></div>
  <div class="sample"><img src="favicon.svg" width="96" height="96" alt=""><span>96</span></div>
  <div class="sample"><img src="favicon.svg" width="256" height="256" alt=""><span>256</span></div>
</div>

<h2>Emerald accent</h2>
<div class="row accent">
  <div class="title-bar" style="color: #34d399">
    <img src="favicon.svg" width="22" height="22" alt="">
    <strong>Darla</strong>
  </div>
  <div class="sample"><img src="favicon.svg" width="48" height="48" alt=""><span>48</span></div>
  <div class="sample"><img src="favicon.svg" width="96" height="96" alt=""><span>96</span></div>
</div>

<h2>Light background (sanity check — should still be readable)</h2>
<div class="row light">
  <div class="sample"><img src="favicon.svg" width="16" height="16" alt=""><span>16</span></div>
  <div class="sample"><img src="favicon.svg" width="32" height="32" alt=""><span>32</span></div>
  <div class="sample"><img src="favicon.svg" width="96" height="96" alt=""><span>96</span></div>
</div>
</body>
</html>
