services:
  postgres:
    image: postgres:16-alpine
    container_name: phishkiller-postgres
    environment:
      POSTGRES_DB: phishkiller
      POSTGRES_USER: phishkiller
      POSTGRES_PASSWORD: phishkiller
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phishkiller"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phishkiller-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: phishkiller-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  worker-beat:
    build: .
    container_name: phishkiller-worker-beat
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P solo -B
      -Q celery,feeds
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-downloads:
    build: .
    container_name: phishkiller-worker-downloads
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P prefork -c 8
      -Q downloads
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-analysis:
    build: .
    container_name: phishkiller-worker-analysis
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P prefork -c 8
      -Q analysis
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://phishkiller:phishkiller@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  downloads:
  extracted:
