services:
  postgres:
    image: postgres:16-alpine
    container_name: phishkiller-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: phishkiller
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: phishkiller-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "[ \"$(redis-cli ping)\" = 'PONG' ]"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: phishkiller-rabbitmq
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: phishkiller-api
    command: >
      uvicorn phishkiller.main:app
      --host 0.0.0.0 --port 8000
    environment:
      PK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - downloads:/app/downloads:ro
      - extracted:/app/extracted:ro
      - ./rules:/app/rules:ro
      - ./private:/app/private:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-beat:
    build: .
    container_name: phishkiller-worker-beat
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P solo -B
      -Q celery
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
      - ./rules:/app/rules:ro
      - ./private:/app/private:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-downloads:
    build: .
    container_name: phishkiller-worker-downloads
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P prefork -c 4
      -Q downloads
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
      PK_BROWSER_DOWNLOAD_ENABLED: "true"
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
      - ./rules:/app/rules:ro
      - ./private:/app/private:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker-analysis:
    build: .
    container_name: phishkiller-worker-analysis
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P prefork -c 10
      -Q analysis
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
      PK_BROWSER_DOWNLOAD_ENABLED: "true"
      PK_BROWSER_RENDER_ON_THIN_RESULTS: "true"
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
      - ./rules:/app/rules:ro
      - ./private:/app/private:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Stealth browser worker for Cloudflare-protected pages
  worker-browser:
    build:
      context: .
      dockerfile: Dockerfile.browser
    container_name: phishkiller-worker-browser
    command: >
      celery -A phishkiller.celery_app worker
      -l info -P solo
      -Q browser
    environment:
      PK_SYNC_DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/phishkiller
      PK_CELERY_BROKER_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672//
      PK_CELERY_RESULT_BACKEND: redis://redis:6379/1
      PK_REDIS_URL: redis://redis:6379/0
      PK_KIT_DOWNLOAD_DIR: /app/downloads
      PK_KIT_EXTRACT_DIR: /app/extracted
      PK_BROWSER_DOWNLOAD_ENABLED: "true"
      PK_BROWSER_DOWNLOAD_TIMEOUT: "60"
    env_file:
      - .env
    volumes:
      - downloads:/app/downloads
      - extracted:/app/extracted
      - ./rules:/app/rules:ro
      - ./private:/app/private:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  downloads:
  extracted:
